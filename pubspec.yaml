name: yt_downloader
description: A mobile video downloader and toolkit by MSK Software Solutions.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State
  go_router: ^17.0.0
  flutter_riverpod: ^3.0.0

  # Data & HTTP
  hive_flutter: ^1.1.0
  http: ^1.1.0
  dio: ^5.2.0
  file_picker: ^11.0.0
  path_provider: ^2.0.14
  path: ^1.8.3

  # Media Playback
  video_player: ^2.8.1
  audioplayers: ^5.2.1

  # Monetization & Login
  google_mobile_ads: ^9.0.0
  google_sign_in: ^7.0.0

  # Design & Icons
  cupertino_icons: ^1.0.5
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
